<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse - Predict & Vote on Trends</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23A100FF'/%3E%3Cpath d='M10 50 H30 L40 30 L60 70 L70 50 H90' stroke='%23FFFFFF' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-navy: #0F1021; --neon-purple: #A100FF; --white: #F5F5F5; --light-navy: #1a1c3a; --gray: #8A8D9F; --header-height: 80px;
        }
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-navy); color: var(--white); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* Header & Navigation */
        header { background: rgba(15, 16, 33, 0.85); backdrop-filter: blur(10px); height: var(--header-height); border-bottom: 1px solid var(--light-navy); position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .logo { font-size: 2rem; font-weight: 700; color: var(--neon-purple); text-decoration: none; }
        .logo span { color: var(--white); font-weight: 400; }
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { color: var(--gray); text-decoration: none; font-weight: 600; transition: color 0.3s; padding: 5px 10px; border-radius: 5px;}
        .nav-links a:hover, .nav-links a.active { color: var(--neon-purple); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .hamburger { display: none; cursor: pointer; }
        .hamburger .bar { display: block; width: 25px; height: 3px; margin: 5px auto; transition: all 0.3s ease-in-out; background-color: var(--white); }
        
        /* Main Content & Layout */
        main { padding: 40px 0; }
        .section-anchor { scroll-margin-top: calc(var(--header-height) + 40px); }
        .app-content { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
        .main-column { grid-column: 2 / 3; }
        .sidebar-column { grid-column: 1 / 2; position: sticky; top: calc(var(--header-height) + 40px); height: fit-content; }
        .section-card { background: var(--light-navy); padding: 25px; border-radius: 12px; border: 1px solid #2a2d5a; }
        .section-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #2a2d5a; display: flex; align-items: center; gap: 10px; }
        #filter-title { font-size: 2rem; margin-bottom: 20px; text-align: left; }
        #filter-title .tag { background: var(--neon-purple); color: var(--white); }

        /* Role-Based Access Views */
        .premium-only-view { position: relative; }
        .premium-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 16, 33, 0.8); backdrop-filter: blur(4px); z-index: 5; border-radius: 12px; display: flex; justify-content: center; align-items: center; text-align: center; }
        .premium-overlay-text { font-size: 1.2rem; font-weight: 600; padding: 20px; }
        .premium-overlay-text span { display: block; font-size: 0.9rem; font-weight: 400; color: var(--gray); margin-top: 5px; }
        
        /* Form */
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; background: var(--dark-navy); border: 1px solid #2a2d5a; border-radius: 8px; padding: 12px; color: var(--white); font-size: 1rem; font-family: 'Outfit', sans-serif; }
        .auth-button { display: flex; align-items: center; justify-content: center; background-color: var(--neon-purple); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.3s, transform 0.2s; text-decoration: none;}
        .auth-button:hover:not(:disabled) { background-color: #8a00d9; transform: translateY(-2px); }
        .auth-button:disabled { background-color: var(--gray); cursor: not-allowed; }
        .user-profile { display: none; align-items: center; gap: 10px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-purple); }
        .user-role-badge { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
        .user-role-badge.premium { background-color: var(--neon-purple); color: var(--white); }
        .user-role-badge.guest { background-color: var(--gray); color: var(--dark-navy); }

        /* Trend Card */
        .trend-card-wrapper { display: block; text-decoration: none; color: inherit; border-radius: 10px; transition: transform 0.2s, box-shadow 0.2s; }
        .trend-card-wrapper.premium:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(161, 0, 255, 0.15); cursor: pointer; }
        .trend-card { background: #1a1c3a; padding: 20px; border-left: 4px solid var(--neon-purple); display: flex; flex-direction: column; gap: 15px; border-radius: 10px; margin-bottom: 20px; }
        .trend-tags { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .tag { background: var(--dark-navy); color: var(--neon-purple); padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: background-color 0.3s; }
        a.tag:hover { background-color: var(--neon-purple); color: var(--white); }
        .verified-badge { font-size: 0.75rem; color: var(--neon-purple); border: 1px solid var(--neon-purple); padding: 2px 8px; border-radius: 12px; }
        .vote-btn { z-index: 2; position: relative; }

        @media(max-width: 992px) {
            .app-content { grid-template-columns: 1fr; }
            .sidebar-column { grid-row: 2; position: static; }
            .main-column { grid-row: 1; }
            .nav-links { position: fixed; left: -100%; top: var(--header-height); gap: 0; flex-direction: column; background-color: var(--light-navy); width: 100%; text-align: center; transition: 0.3s; padding-bottom: 20px; border-bottom: 1px solid #2a2d5a; }
            .nav-links.active { left: 0; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <a href="?" class="logo">Trend<span>Pulse</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="#trends-section">Trends</a></li>
                <li><a href="#leaderboard-section">📈 Trending Board</a></li>
            </ul>
            <div class="nav-right">
                <div id="auth-container">
                    <!-- FIX: Button is disabled by default to prevent race condition -->
                    <button id="signin-button" class="auth-button" disabled>Initializing...</button>
                    <div id="user-profile" class="user-profile">
                        <img id="user-pic" src="" alt="User pic">
                        <div>
                            <span id="user-name" style="display: block; line-height: 1.2;"></span>
                            <span id="user-role-badge" class="user-role-badge"></span>
                        </div>
                        <button id="signout-button" class="auth-button" title="Sign Out"><span data-feather="log-out"></span></button>
                    </div>
                </div>
                <div class="hamburger" id="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="app-content" class="app-content">
            <div class="sidebar-column">
                <div id="submit-section" class="section-card section-anchor">
                    <h2 class="section-title"><span data-feather="plus-circle"></span>Submit a New Trend</h2>
                    <form id="trend-form">
                        <div class="form-group"><input type="text" id="trend-title" placeholder="Trend Title" required></div>
                        <div class="form-group"><textarea id="trend-description" placeholder="Why is this a growing trend?" required></textarea></div>
                        <div class="form-group"><input type="url" id="trend-source" placeholder="https://source-link.com (optional)"></div>
                        <div class="form-group"><input type="text" id="trend-tags" placeholder="Tags (e.g. ai, web3, fashion)" required></div>
                        <button type="submit" class="auth-button" style="width: 100%;">Pulse It!</button>
                    </form>
                </div>
            </div>
            <div class="main-column">
                <div id="trends-section" class="section-anchor">
                    <h2 id="filter-title" class="hidden"></h2>
                    <div id="trends-list"></div>
                </div>

                <div id="leaderboard-section" class="section-card section-anchor premium-only-view">
                    <h2 class="section-title"><span data-feather="bar-chart-2"></span>Top Trends Leaderboard</h2>
                    <canvas id="trends-chart"></canvas>
                    <div id="premium-overlay-content" class="premium-overlay hidden">
                        <div class="premium-overlay-text">
                            <span data-feather="lock" style="width: 48px; height: 48px; margin: 0 auto 10px;"></span>
                            Analytics are for Premium Users
                            <span>Sign in with a company or university account to view.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <script>
        // --- GLOBAL STATE & CONFIG ---
        let auth, db, user = null;
        let trendChart;
        const PUBLIC_DOMAINS = ['gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com', 'aol.com', 'icloud.com'];
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // --- DOM ELEMENTS ---
        const dom = {
            signInButton: document.getElementById('signin-button'),
            signOutButton: document.getElementById('signout-button'),
            userProfile: document.getElementById('user-profile'),
            userName: document.getElementById('user-name'),
            userPic: document.getElementById('user-pic'),
            userRoleBadge: document.getElementById('user-role-badge'),
            trendForm: document.getElementById('trend-form'),
            trendsList: document.getElementById('trends-list'),
            premiumOverlay: document.getElementById('premium-overlay-content'),
            filterTitle: document.getElementById('filter-title'),
            hamburger: document.getElementById('hamburger'),
            navLinks: document.getElementById('nav-links'),
        };
        
        // --- APP INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initStaticEventListeners();
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith("YOUR_")) {
                dom.signInButton.textContent = "Config Missing";
                alert("Firebase config is missing. App will not function correctly.");
                return;
            }
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();

            // --- FIX: Enable the sign-in button only after Firebase is ready ---
            dom.signInButton.disabled = false;
            dom.signInButton.textContent = "Sign In with Google";
            
            initFirebaseAuth();
        });

        function initStaticEventListeners() {
            dom.signInButton.addEventListener('click', signInWithGoogle);
            dom.signOutButton.addEventListener('click', signOut);
            dom.trendForm.addEventListener('submit', handleTrendSubmit);
            dom.hamburger.addEventListener('click', () => {
                dom.hamburger.classList.toggle('active');
                dom.navLinks.classList.toggle('active');
            });
        }

        function initFirebaseAuth() {
            auth.onAuthStateChanged(async (firebaseUser) => {
                if (firebaseUser) {
                    await handleUserSignIn(firebaseUser);
                } else {
                    handleUserSignOut();
                }
                const tagFilter = new URLSearchParams(window.location.search).get('tag');
                fetchAndRenderTrends(tagFilter);
            });
        }
        
        // --- AUTHENTICATION & USER ROLES ---
        async function handleUserSignIn(firebaseUser) {
            const userRef = db.collection('users').doc(firebaseUser.uid);
            const userDoc = await userRef.get();
            
            if (!userDoc.exists) {
                const email = firebaseUser.email || '';
                const domain = email.split('@')[1] || '';
                const role = determineUserRole(domain);
                user = {
                    uid: firebaseUser.uid,
                    displayName: firebaseUser.displayName,
                    email, domain, role,
                };
                await userRef.set(user);
            } else {
                user = userDoc.data();
            }
            updateUIAfterAuthChange();
        }
        
        function handleUserSignOut() {
            user = null;
            updateUIAfterAuthChange();
        }

        function determineUserRole(domain) {
            if (!domain) return 'guest';
            const isPublic = PUBLIC_DOMAINS.includes(domain.toLowerCase());
            const isEdu = domain.toLowerCase().endsWith('.edu') || domain.toLowerCase().endsWith('.ac.uk');
            return isPublic && !isEdu ? 'guest' : 'premium';
        }

        function updateUIAfterAuthChange() {
            const isLoggedIn = !!user;
            const isPremium = isLoggedIn && user.role === 'premium';
            
            dom.signInButton.classList.toggle('hidden', isLoggedIn);
            dom.userProfile.style.display = isLoggedIn ? 'flex' : 'none';
            dom.premiumOverlay.classList.toggle('hidden', isPremium);
            dom.trendForm.style.opacity = isLoggedIn ? '1' : '0.5';
            dom.trendForm.style.pointerEvents = isLoggedIn ? 'auto' : 'none';

            if (isLoggedIn) {
                dom.userName.textContent = user.displayName;
                dom.userPic.src = user.photoURL;
                dom.userRoleBadge.textContent = user.role;
                dom.userRoleBadge.className = `user-role-badge ${user.role}`;
            }
            feather.replace();
        }
        
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                console.error("Sign in error:", error);
                alert(`Error: ${error.message}`);
            }
        }

        async function signOut() {
            await auth.signOut();
        }
        
        // --- DATA FETCHING & RENDERING ---
        async function fetchAndRenderTrends(tagFilter = null) {
            dom.trendsList.innerHTML = '<div style="text-align: center; padding: 20px;">Loading trends...</div>';
            
            let query = db.collection('trends').orderBy('createdAt', 'desc');
            if (tagFilter) {
                query = query.where('tags', 'array-contains', tagFilter);
                dom.filterTitle.innerHTML = `Trending in <a href="?tag=${tagFilter}" class="tag">#${tagFilter}</a> <a href="?" style="font-size: 1rem; text-decoration: none;">×</a>`;
                dom.filterTitle.classList.remove('hidden');
            } else {
                dom.filterTitle.classList.add('hidden');
            }
            
            try {
                const snapshot = await query.get();
                const trends = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const userVotes = user ? await getUserVotes(user.uid) : [];
                
                dom.trendsList.innerHTML = '';
                if (trends.length === 0) {
                    dom.trendsList.innerHTML = '<div style="text-align: center; padding: 20px;">No trends found.</div>';
                } else {
                    trends.forEach(trend => renderTrendCard(trend, userVotes));
                }
                updateChart(trends);
                feather.replace();
            } catch (error) {
                console.error("Error fetching trends:", error);
                dom.trendsList.innerHTML = '<div style="text-align: center; padding: 20px;">Error loading trends.</div>';
            }
        }

        function renderTrendCard(trend, userVotes) {
            const isPremium = user && user.role === 'premium';
            const hasVoted = userVotes.includes(trend.id);
            
            const cardWrapper = document.createElement(isPremium && trend.sourceUrl ? 'a' : 'div');
            cardWrapper.className = 'trend-card-wrapper ' + (isPremium ? 'premium' : 'guest');
            if (isPremium && trend.sourceUrl) {
                cardWrapper.href = trend.sourceUrl;
                cardWrapper.target = '_blank';
                cardWrapper.rel = 'noopener noreferrer';
            }

            let tagsHTML = (trend.tags || []).map(tag => `<a href="?tag=${tag}" class="tag" onclick="event.stopPropagation()">#${tag}</a>`).join('');
            if (trend.verified) {
                tagsHTML += `<span class="verified-badge" title="Source URL provided and verified">✅ Verified Source</span>`;
            }

            cardWrapper.innerHTML = `
                <div class="trend-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 15px;">
                        <h3 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 10px;">${trend.title}</h3>
                        <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                            <span style="font-size: 1.5rem; font-weight: 700;">${trend.voteCount || 0}</span>
                            <button class="auth-button vote-btn" data-id="${trend.id}" ${!user || hasVoted ? 'disabled' : ''} onclick="handleVoteClick(event, '${trend.id}')">${hasVoted ? 'Voted' : 'Vote'}</button>
                        </div>
                    </div>
                    <p style="color: var(--gray);">${trend.description}</p>
                    <div class="trend-tags">${tagsHTML}</div>
                </div>`;
            dom.trendsList.appendChild(cardWrapper);
        }

        // --- VOTING & SUBMISSION LOGIC ---
        async function handleVoteClick(event, trendId) {
            event.preventDefault();
            event.stopPropagation();
            if (!user) return;
            
            const voteButton = event.target;
            voteButton.disabled = true;

            const today = new Date().toISOString().split('T')[0];
            const userVotesRef = db.collection('users').doc(user.uid).collection('dailyVotes').doc(today);
            const trendRef = db.collection('trends').doc(trendId);

            try {
                await db.runTransaction(async (transaction) => {
                    const userVotesDoc = await transaction.get(userVotesRef);
                    const votedIds = userVotesDoc.exists ? userVotesDoc.data().votedIds || [] : [];
                    
                    if (votedIds.length >= 3) throw new Error("Vote limit reached for today.");
                    if (votedIds.includes(trendId)) throw new Error("Already voted for this trend today.");

                    transaction.set(userVotesRef, { votedIds: [...votedIds, trendId] }, { merge: true });
                    transaction.update(trendRef, { voteCount: firebase.firestore.FieldValue.increment(1) });
                });
                voteButton.textContent = "Voted";
            } catch (error) {
                console.error("Vote Error:", error);
                alert(error.message);
                voteButton.disabled = false;
            }
        }
        
        async function getUserVotes(userId) {
            const today = new Date().toISOString().split('T')[0];
            const doc = await db.collection('users').doc(userId).collection('dailyVotes').doc(today).get();
            return doc.exists ? doc.data().votedIds || [] : [];
        }

        async function handleTrendSubmit(e) {
            e.preventDefault();
            if (!user) {
                alert("You must be signed in to submit a trend.");
                return;
            }
            const form = e.target;
            const title = form['trend-title'].value.trim();
            const description = form['trend-description'].value.trim();
            const sourceUrl = form['trend-source'].value.trim();
            const tags = form['trend-tags'].value.split(',').map(t => t.trim().toLowerCase().replace(/[^a-z0-9-]/gi, '')).filter(Boolean);

            if (!title || !description || tags.length === 0) {
                alert("Title, description, and at least one tag are required.");
                return;
            }
            
            try {
                await db.collection('trends').add({
                    title, description, sourceUrl, tags,
                    verified: !!sourceUrl,
                    voteCount: 0,
                    creatorId: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                form.reset();
                fetchAndRenderTrends(new URLSearchParams(window.location.search).get('tag'));
            } catch (error) {
                console.error("Error submitting trend: ", error);
                alert("Failed to submit trend.");
            }
        }
        
        // --- CHARTING ---
        function updateChart(trends) {
            const topTrends = [...trends].sort((a, b) => b.voteCount - a.voteCount).slice(0, 7).reverse();
            const ctx = document.getElementById('trends-chart').getContext('2d');
            
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topTrends.map(t => t.title),
                    datasets: [{
                        label: 'Votes',
                        data: topTrends.map(t => t.voteCount),
                        backgroundColor: 'rgba(161, 0, 255, 0.6)',
                        borderColor: 'rgba(161, 0, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: 'var(--white)' } }, y: { ticks: { color: 'var(--white)' } } }, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
