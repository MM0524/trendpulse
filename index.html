<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse - Predict & Vote on Trends</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23A100FF'/%3E%3Cpath d='M10 50 H30 L40 30 L60 70 L70 50 H90' stroke='%23FFFFFF' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-navy: #0F1021; --neon-purple: #A100FF; --white: #F5F5F5; --light-navy: #1a1c3a; --gray: #8A8D9F; --error-red: #ff4757; --header-height: 80px;
            --accent-purple: #a855f7; --accent-purple-hover: #c084fc;
        }
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-navy); color: var(--white); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }
        header { background: rgba(15, 16, 33, 0.85); backdrop-filter: blur(10px); height: var(--header-height); border-bottom: 1px solid var(--light-navy); position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .logo { font-size: 2rem; font-weight: 700; color: var(--neon-purple); text-decoration: none; }
        .logo span { color: var(--white); font-weight: 400; }
        .nav-links { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-links a { color: var(--gray); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .nav-links a:hover { color: var(--neon-purple); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .auth-button { display: flex; align-items: center; background-color: var(--neon-purple); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.3s, transform 0.2s; }
        .user-profile { display: none; align-items: center; gap: 15px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-purple); }
        .edit-prefs-btn { background: none; border: none; cursor: pointer; color: var(--gray); padding: 5px; }
        .edit-prefs-btn:hover { color: var(--white); }
        main { padding: 40px 0; }
        .app-content { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 992px) { .app-content { grid-template-columns: minmax(0, 1fr) minmax(0, 2fr); } }
        .column-1 { grid-column: 1 / 2; }
        .column-2 { grid-column: 1 / 2; }
        @media (min-width: 992px) { .column-1 { grid-column: 1 / 2; } .column-2 { grid-column: 2 / 3; grid-row: 1 / 3; } }
        .section-card { background: var(--light-navy); padding: 25px; border-radius: 12px; border: 1px solid #2a2d5a; margin-bottom: 40px; }
        .section-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #2a2d5a; display: flex; align-items: center; gap: 10px; }
        .trend-card { background: #1a1c3a; padding: 20px; border-left: 4px solid var(--neon-purple); display: flex; flex-direction: column; gap: 15px; border-radius: 10px; margin-bottom: 20px; }
        .trend-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: var(--dark-navy); color: var(--neon-purple); padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; }
        .vote-btn { background-color: var(--accent-purple); color: var(--white); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        
        /* Modal & Preferences Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 16, 33, 0.7); backdrop-filter: blur(5px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--light-navy); padding: 40px; border-radius: 12px; max-width: 600px; width: 90%; position: relative; border: 1px solid #2a2d5a; text-align: center; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--white); font-size: 2rem; cursor: pointer; }
        .modal-content h2 { color: var(--neon-purple); margin-bottom: 15px; }
        .modal-content p { color: var(--gray); margin-bottom: 25px; }
        #interest-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .interest-btn { background: var(--dark-navy); color: var(--gray); border: 1px solid #2a2d5a; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .interest-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); }
        .interest-btn.active { background: var(--neon-purple); color: var(--white); border-color: var(--neon-purple); }
        .signin-options { display: flex; flex-direction: column; gap: 15px; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background-color: var(--light-navy); color: var(--white); padding: 15px 25px; border-radius: 8px; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: bottom 0.5s; border-left: 4px solid var(--neon-purple); }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="?" class="logo">Trend<span>Pulse</span></a>
            <div class="nav-right">
                <div id="auth-container">
                    <button id="auth-button" class="auth-button">Sign In</button>
                    <div id="user-profile" class="user-profile">
                        <span id="user-name"></span>
                        <img id="user-pic" src="" alt="User pic">
                        <!-- NEW: Edit Preferences Button -->
                        <button class="edit-prefs-btn" id="edit-prefs-btn" title="Edit Interests">
                            <span data-feather="edit-2"></span>
                        </button>
                        <button id="signout-button" class="auth-button" title="Sign Out" style="padding: 10px;"><span data-feather="log-out"></span></button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="sign-in-prompt" class="sign-in-prompt"><h2>Welcome to TrendPulse</h2><p>Sign in to see a personalized feed of trends.</p></div>
        <div id="app-content" class="app-content hidden">
            <div class="column-1">
                <!-- Submit section structure can remain here -->
            </div>
            <div class="column-2" style="grid-column: 1 / 3;">
                <div id="trends-section" class="section-card section-anchor">
                     <h2 class="section-title"><span data-feather="zap"></span>Your Personalized Feed</h2>
                    <div id="trends-list"><div class="loading-spinner">Loading your feed...</div></div>
                </div>
            </div>
        </div>
    </main>

    <!-- NEW: Preferences Modal -->
    <div class="modal-overlay" id="preferences-modal">
        <div class="modal-content">
            <button class="modal-close">×</button>
            <h2>Select Your Interests</h2>
            <p>Choose a few topics to personalize your TrendPulse feed.</p>
            <div id="interest-options"></div>
            <button id="save-preferences-btn" class="auth-button" style="width: 100%; justify-content: center;">Save Preferences</button>
        </div>
    </div>

    <!-- Other modals (signin, about) can remain here -->
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <script>
        // --- GLOBAL STATE & CONSTANTS ---
        let auth, db, user;
        const firebaseConfig = { /* YOUR FIREBASE CONFIG */ };
        const INTEREST_CATEGORIES = ['coffee', 'snacks', 'korean food', 'healthy food', 'ai', 'fashion', 'gaming', 'climate', 'design', 'tech'];

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initUniversalEventListeners();
            feather.replace();

            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith("YOUR_")) {
                console.warn("Firebase config missing. Running in Mock Data Mode.");
                initializeAppWithMockData();
            } else {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                initFirebaseAuth();
            }
        });

        function initUniversalEventListeners() {
            // Modal handling
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', e => {
                    if (e.target.matches('.modal-overlay, .modal-close')) {
                        modal.classList.remove('active');
                    }
                });
            });
            document.getElementById('auth-button').addEventListener('click', () => { /* Show sign-in modal */ });
            document.getElementById('edit-prefs-btn').addEventListener('click', showPreferencesModal);
            document.getElementById('save-preferences-btn').addEventListener('click', savePreferences);
        }

        function initFirebaseAuth() {
            auth.onAuthStateChanged(async firebaseUser => {
                if (firebaseUser) {
                    await handleUserSignIn(firebaseUser);
                } else {
                    handleUserSignOut();
                }
            });
        }
        
        function initializeAppWithMockData() {
            updateUIForSignOut();
            document.getElementById('sign-in-prompt').innerHTML = `<h2>Demo Mode</h2><p>Please connect Firebase to use the personalization features.</p>`;
        }
        
        // --- AUTH & USER LOGIC ---
        async function handleUserSignIn(firebaseUser) {
            const userRef = db.collection('users').doc(firebaseUser.uid);
            const userDoc = await userRef.get();
            
            if (!userDoc.exists) {
                // Create user profile on first login
                await userRef.set({
                    displayName: firebaseUser.displayName,
                    email: firebaseUser.email,
                    photoURL: firebaseUser.photoURL,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    preferences: [] // Initialize with empty preferences
                });
                user = { uid: firebaseUser.uid, preferences: [], ...firebaseUser };
                updateUIForSignIn(user);
                showPreferencesModal(); // First-time user, show modal immediately
            } else {
                user = { uid: firebaseUser.uid, ...userDoc.data() };
                updateUIForSignIn(user);
                // Check if preferences are set
                if (!user.preferences || user.preferences.length === 0) {
                    showPreferencesModal(); // Returning user, but no prefs set
                } else {
                    fetchPersonalizedTrends(); // Prefs exist, load feed
                }
            }
        }
        
        function handleUserSignOut() {
            user = null;
            updateUIForSignOut();
        }

        function updateUIForSignIn(userData) {
            document.getElementById('auth-button').classList.add('hidden');
            const profile = document.getElementById('user-profile');
            profile.style.display = 'flex';
            document.getElementById('user-name').textContent = userData.displayName.split(' ')[0];
            document.getElementById('user-pic').src = userData.photoURL;
            document.getElementById('sign-in-prompt').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
        }

        function updateUIForSignOut() {
            document.getElementById('auth-button').classList.remove('hidden');
            document.getElementById('user-profile').style.display = 'none';
            document.getElementById('sign-in-prompt').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
        }

        // --- PREFERENCES LOGIC ---
        function showPreferencesModal() {
            const optionsContainer = document.getElementById('interest-options');
            optionsContainer.innerHTML = ''; // Clear old options

            INTEREST_CATEGORIES.forEach(interest => {
                const btn = document.createElement('button');
                btn.className = 'interest-btn';
                btn.textContent = interest;
                btn.dataset.interest = interest;
                // Pre-select if already in user's preferences
                if (user && user.preferences && user.preferences.includes(interest)) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => btn.classList.toggle('active'));
                optionsContainer.appendChild(btn);
            });

            document.getElementById('preferences-modal').classList.add('active');
        }

        async function savePreferences() {
            if (!user) return showToast('You must be signed in.', true);

            const selectedNodes = document.querySelectorAll('#interest-options .interest-btn.active');
            const selectedPrefs = Array.from(selectedNodes).map(node => node.dataset.interest);
            
            const userRef = db.collection('users').doc(user.uid);
            try {
                await userRef.update({ preferences: selectedPrefs });
                user.preferences = selectedPrefs; // Update local user object
                document.getElementById('preferences-modal').classList.remove('active');
                showToast('Preferences saved!');
                fetchPersonalizedTrends(); // Refresh feed with new preferences
            } catch (error) {
                console.error("Error saving preferences:", error);
                showToast('Could not save preferences.', true);
            }
        }

        // --- DATA FETCHING & RENDERING ---
        async function fetchPersonalizedTrends() {
            const trendsList = document.getElementById('trends-list');
            trendsList.innerHTML = '<div class="loading-spinner">Loading your feed...</div>';

            if (!user || !user.preferences || user.preferences.length === 0) {
                trendsList.innerHTML = '<div class="empty-state">Select some interests to see your personalized feed! Click the <span data-feather="edit-2" style="width:1em; height:1em; vertical-align: -0.125em;"></span> icon to start.</div>';
                feather.replace();
                return;
            }
            
            // Firestore's 'array-contains-any' is limited to 10 values.
            // If you have more, you'd need multiple queries and merge client-side.
            const queryPrefs = user.preferences.slice(0, 10);
            
            try {
                const query = db.collection('trends').where('tags', 'array-contains-any', queryPrefs);
                const snapshot = await query.get();
                
                const trends = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTrends(trends);
            } catch (error) {
                console.error("Error fetching personalized trends:", error);
                trendsList.innerHTML = '<div class="empty-state">Could not load trends. Please try again later.</div>';
            }
        }

        function renderTrends(trends) {
            const listEl = document.getElementById('trends-list');
            listEl.innerHTML = '';

            if (trends.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No trends found for your interests yet. Try adding more!</div>';
                return;
            }

            // Simple render, can be expanded
            trends.sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));

            trends.forEach(trend => {
                const trendEl = document.createElement('div');
                trendEl.className = 'trend-card';
                trendEl.innerHTML = `
                    <h3 style="font-size: 1.5rem; font-weight: 600;">${trend.title}</h3>
                    <p style="color: var(--gray);">${trend.description}</p>
                    <div class="trend-tags">
                        ${(trend.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                        <span>${trend.voteCount || 0} Votes</span>
                        <button class="vote-btn">Vote</button>
                    </div>`;
                listEl.appendChild(trendEl);
            });
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast') || document.createElement('div');
            if (!toast.id) {
                toast.id = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.className = isError ? 'show error' : 'show';
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        // Dummy function for sign-in button
        document.getElementById('auth-button').addEventListener('click', () => {
            if(auth) {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => showToast(err.message, true));
            } else {
                showToast('Firebase not configured. Cannot sign in.', true);
            }
        });

    </script>
</body>
</html>
