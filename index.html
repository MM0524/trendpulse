<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse - Predict & Vote on Trends</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23A100FF'/%3E%3Cpath d='M10 50 H30 L40 30 L60 70 L70 50 H90' stroke='%23FFFFFF' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-navy: #0F1021; --neon-purple: #A100FF; --white: #F5F5F5; --light-navy: #1a1c3a; --gray: #8A8D9F; --error-red: #ff4757; --header-height: 80px;
        }
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-navy); color: var(--white); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* --- Header & Navigation --- */
        header { background: rgba(15, 16, 33, 0.85); backdrop-filter: blur(10px); height: var(--header-height); border-bottom: 1px solid var(--light-navy); position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .logo { font-size: 2rem; font-weight: 700; color: var(--neon-purple); text-decoration: none; }
        .logo span { color: var(--white); font-weight: 400; }
        .nav-links { display: flex; list-style: none; gap: 30px; margin-right: auto; padding-left: 40px; } /* Adjusted padding */
        .nav-links a { color: var(--gray); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-purple); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .hamburger { display: none; cursor: pointer; }
        .hamburger .bar { display: block; width: 25px; height: 3px; margin: 5px auto; transition: all 0.3s ease-in-out; background-color: var(--white); }
        .auth-button { display: flex; align-items: center; background-color: var(--neon-purple); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.3s, transform 0.2s; }
        .auth-button:hover { background-color: #8a00d9; transform: translateY(-2px); }
        
        /* --- NEW: Style for the "Trending" button --- */
        .nav-action-btn {
            display: flex;
            align-items: center;
            background: transparent;
            color: var(--gray);
            border: 1px solid var(--gray);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav-action-btn:hover {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }
        .hidden-desktop { display: none; } /* Utility class */

        .user-profile { display: none; align-items: center; gap: 15px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-purple); }
        
        /* Main Content */
        main { padding: 40px 0; }
        .section-anchor { scroll-margin-top: calc(var(--header-height) + 20px); }
        .app-content { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .column { display: flex; flex-direction: column; gap: 40px; }
        .section-card { background: var(--light-navy); padding: 25px; border-radius: 12px; border: 1px solid #2a2d5a; }
        .section-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #2a2d5a; display: flex; align-items: center; gap: 10px; }
        
        /* Other Styles (unchanged) */
        .category-filters, .form-group, .trend-card-link, .tag, #load-more-container, .modal-overlay, .signin-options { /* ... */ }

        @media(max-width: 992px) {
            .nav-links { position: fixed; left: -100%; top: var(--header-height); gap: 0; flex-direction: column; background-color: var(--light-navy); width: 100%; text-align: center; transition: 0.3s; padding-bottom: 20px; border-bottom: 1px solid #2a2d5a; padding-left: 0; margin-right: 0; }
            .nav-links.active { left: 0; }
            .hamburger { display: block; }
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
            .app-content { grid-template-columns: 1fr; }
            .nav-action-btn { display: none; } /* NEW: Hide desktop button on mobile */
            .hidden-desktop { display: list-item; } /* NEW: Show mobile link in menu */
        }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <a href="?" class="logo">Trend<span>Pulse</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="#trends-section">Top Trends</a></li>
                <li><a href="#submit-section">Submit</a></li>
                <!-- NEW: Link for mobile hamburger menu -->
                <li class="hidden-desktop"><a href="#leaderboard-section">Trending</a></li>
                <li><a href="#" class="nav-about-link">About</a></li>
            </ul>
            <div class="nav-right">
                <!-- NEW: Button for desktop view -->
                <a href="#leaderboard-section" class="nav-action-btn">Trending</a>
                
                <div id="auth-container">
                    <button id="auth-button" class="auth-button">Sign In</button>
                    <div id="user-profile" class="user-profile">
                        <span id="user-name"></span>
                        <img id="user-pic" src="" alt="User pic">
                        <button id="signout-button" class="auth-button" title="Sign Out"><span data-feather="log-out"></span></button>
                    </div>
                </div>
                <div class="hamburger" id="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- ... (rest of the main content is unchanged) ... -->

        <div id="app-content" class="hidden">
            <div class="column">
                <!-- Submit Section -->
                <div id="submit-section" class="section-card section-anchor">
                     <!-- ... form content ... -->
                </div>

                <!-- Trends List -->
                <div id="trends-section" class="section-card section-anchor">
                    <!-- ... trends list content ... -->
                </div>
            </div>

            <!-- Column with Leaderboard -->
            <div class="column">
                <!-- NEW: Added id="leaderboard-section" to make the anchor link work -->
                <div id="leaderboard-section" class="section-card section-anchor">
                    <h2 class="section-title"><span data-feather="bar-chart-2"></span>Top Trends Chart</h2>
                    <div id="chart-container">
                        <!-- Chart canvas -->
                    </div>
                    <div id="user-vote-info"></div>
                </div>
            </div>
        </div>

        <!-- ... (rest of the HTML is unchanged) ... -->
    </main>

    <!-- ... (modals and other elements are unchanged) ... -->
    
    <!-- SCRIPT (unchanged from the previous version) -->
    <script>
        // All previous JavaScript code remains the same.
        // It will work with the new navbar elements without modification.
    </script>
</body>
</html>
