<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse - Predict & Vote on Trends</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23A100FF'/%3E%3Cpath d='M10 50 H30 L40 30 L60 70 L70 50 H90' stroke='%23FFFFFF' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-navy: #0F1021; --neon-purple: #A100FF; --white: #F5F5F5; --light-navy: #1a1c3a; --gray: #8A8D9F; --error-red: #ff4757; --header-height: 80px;
            --accent-purple: #a855f7;
            --accent-purple-hover: #c084fc;
        }
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-navy); color: var(--white); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* Header & Nav */
        header { background: rgba(15, 16, 33, 0.85); backdrop-filter: blur(10px); height: var(--header-height); border-bottom: 1px solid var(--light-navy); position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .logo { font-size: 2rem; font-weight: 700; color: var(--neon-purple); text-decoration: none; }
        .logo span { color: var(--white); font-weight: 400; }
        .nav-links { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-links a { color: var(--gray); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-purple); }
        .auth-button { display: flex; align-items: center; background-color: var(--neon-purple); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.3s, transform 0.2s; }
        .user-profile { display: none; align-items: center; gap: 15px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-purple); }
        
        /* Main Content & Layout */
        main { padding: 40px 0; }
        .section-anchor { scroll-margin-top: calc(var(--header-height) + 20px); }
        .app-content { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 992px) { .app-content { grid-template-columns: minmax(0, 1fr) minmax(0, 2fr); } }
        .column-1 { grid-column: 1 / 2; }
        .column-2 { grid-column: 1 / 2; }
        @media (min-width: 992px) { .column-1 { grid-column: 1 / 2; } .column-2 { grid-column: 2 / 3; grid-row: 1 / 3; } }
        .section-card { background: var(--light-navy); padding: 25px; border-radius: 12px; border: 1px solid #2a2d5a; margin-bottom: 40px; }
        .section-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #2a2d5a; display: flex; align-items: center; gap: 10px; }
        
        /* Search Bar & Filters */
        .search-container { margin-bottom: 20px; }
        #search-input {
            width: 100%; max-width: 28rem; margin: 0 auto; display: block;
            background-color: var(--dark-navy); /* Like bg-gray-800/900 */
            border-radius: 9999px; /* rounded-full */
            padding: 8px 16px; /* py-2 px-4 */
            color: var(--white);
            border: 1px solid var(--light-navy);
            font-size: 1rem;
        }
        #search-input:focus { outline: none; border-color: var(--neon-purple); }

        .filter-status-bar { display: flex; justify-content: space-between; align-items: center; background-color: var(--dark-navy); padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--neon-purple); }
        .filter-text { font-weight: 600; }
        .clear-filter-btn { background: none; border: 1px solid var(--gray); color: var(--gray); padding: 5px 10px; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
        .clear-filter-btn:hover { background-color: var(--gray); color: var(--dark-navy); }
        
        .category-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .category-filter-btn { background: var(--dark-navy); color: var(--gray); border: 1px solid #2a2d5a; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .category-filter-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); }
        .category-filter-btn.active { background: var(--neon-purple); color: var(--white); border-color: var(--neon-purple); }

        /* Form & Cards */
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--dark-navy); border: 1px solid #2a2d5a; border-radius: 8px; padding: 12px; color: var(--white); font-size: 1rem; font-family: 'Outfit', sans-serif; }
        .trend-card-link { display: block; text-decoration: none; color: inherit; }
        .trend-card { background: #1a1c3a; padding: 20px; border-left: 4px solid var(--neon-purple); display: flex; flex-direction: column; gap: 15px; border-radius: 10px; margin-bottom: 20px; transition: transform 0.2s, box-shadow 0.2s; }
        .trend-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(161, 0, 255, 0.15); }
        .trend-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: var(--dark-navy); color: var(--neon-purple); padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; }
        a.tag { cursor: pointer; transition: background-color 0.3s; }
        a.tag:hover { background-color: var(--neon-purple); color: var(--white); }

        /* Redesigned Vote Button */
        .vote-btn {
            background-color: var(--accent-purple); /* bg-purple-500 */
            color: var(--white);
            border: none;
            padding: 6px 12px; /* py-1.5 px-3 */
            border-radius: 9999px; /* rounded-full */
            cursor: pointer;
            font-size: 0.875rem; /* text-sm */
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .vote-btn:hover:not(:disabled) {
            background-color: var(--accent-purple-hover); /* hover:bg-purple-400 */
        }
        .vote-btn:disabled {
            background-color: var(--light-navy);
            color: var(--gray);
            cursor: not-allowed;
            border: 1px solid var(--gray);
        }

        #load-more-container { text-align: center; margin-top: 20px; }
        .load-more-btn { background-color: var(--light-navy); color: var(--white); border: 1px solid var(--neon-purple); padding: 10px 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }

        /* Other UI & Responsive */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background-color: var(--light-navy); color: var(--white); padding: 15px 25px; border-radius: 8px; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: bottom 0.5s; border-left: 4px solid var(--neon-purple); }
        #toast.show { bottom: 30px; }
        #toast.error { border-left-color: var(--error-red); }
        @media(max-width: 992px) {
            .nav-links { position: fixed; left: -100%; top: var(--header-height); gap: 0; flex-direction: column; background-color: var(--light-navy); width: 100%; text-align: center; transition: 0.3s; padding: 20px 0; border-bottom: 1px solid #2a2d5a; }
            .nav-links.active { left: 0; }
            .hamburger { display: block; }
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        }
    </style>
</head>
<body>
    <header>
        <!-- Navbar structure remains the same -->
    </header>

    <main class="container">
        <!-- Sign-in prompt structure remains the same -->

        <div id="app-content" class="app-content hidden">
            <div class="column-1">
                <!-- Submit section structure remains the same -->
            </div>
            <div class="column-2">
                <div id="trends-section" class="section-card section-anchor">
                     <h2 class="section-title"><span data-feather="zap"></span>Trending Now</h2>
                     
                     <!-- NEW: Search Bar -->
                     <div class="search-container">
                        <input type="search" id="search-input" placeholder="Search trends or hashtags...">
                     </div>
                     
                     <!-- NEW: Filter Status Bar -->
                     <div id="filter-status-container"></div>
                     
                     <div id="category-filters" class="category-filters"></div>
                    <div id="trends-list"></div>
                    <div id="load-more-container"><button id="load-more-btn" class="load-more-btn">Load More</button></div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- All modals remain the same -->
    
    <!-- CDNs remain the same -->

    <script>
        // --- GLOBAL STATE ---
        let auth, db, user, userUnsubscribe;
        let allFetchedTrends = []; // Holds all trends for client-side filtering
        let currentFilter = { type: 'all', value: '' };
        
        const TRENDS_PER_PAGE = 5;
        const CATEGORIES = ['All', 'Technology', 'Fashion', 'Climate', 'Gaming', 'Education', 'Design'];
        const firebaseConfig = { /* YOUR CONFIG */ };
        const seedTrends = [ /* SEED DATA */ ];

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initUniversalEventListeners();
            populateCategoryDropdown();
            feather.replace();

            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith("YOUR_")) {
                console.warn("Firebase config missing. Running in Mock Data Mode.");
                initializeAppWithMockData();
            } else {
                // Live mode initialization will be done inside initUniversalEventListeners
            }
        });

        function initUniversalEventListeners() {
            // ... [omitted for brevity, includes modal and nav listeners]
            
            // NEW: Search input listener
            document.getElementById('search-input').addEventListener('input', (e) => {
                applyFilter('search', e.target.value.toLowerCase());
            });
            
            // NEW: Delegated listener for tag clicks
            document.getElementById('trends-list').addEventListener('click', (e) => {
                if (e.target.matches('.tag-link')) {
                    e.preventDefault();
                    const tag = e.target.dataset.tag;
                    applyFilter('tag', tag);
                }
            });

            // Initialize correct mode
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith("YOUR_")) {
                initMockMode();
            } else {
                initLiveMode();
            }
        }

        // --- LIVE & MOCK MODE INITIALIZERS ---
        function initLiveMode() {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            seedDatabaseIfNeeded();
            
            // ... [auth listeners and other live-specific setups]
            
            fetchAllTrends(); // Fetch all data for client-side search
        }

        function initMockMode() {
            allFetchedTrends = seedTrends.map(t => ({...t, id: Math.random().toString()}));
            updateUIForSignOut(); // Start in signed-out state for demo
            document.getElementById('sign-in-prompt').innerHTML = `<h2>Demo Mode</h2><p>Displaying mock data.</p>`;
            document.getElementById('app-content').classList.remove('hidden');
            setupCategoryFilters();
            applyFilter('all'); // Initial render
        }

        // --- FILTERING & RENDERING LOGIC ---
        function applyFilter(type, value = '') {
            currentFilter = { type, value };
            
            let filteredTrends = [];
            if (currentFilter.type === 'category') {
                if (currentFilter.value === 'All') {
                    filteredTrends = allFetchedTrends;
                } else {
                    filteredTrends = allFetchedTrends.filter(t => t.category === currentFilter.value);
                }
            } else if (currentFilter.type === 'tag') {
                filteredTrends = allFetchedTrends.filter(t => t.tags.includes(currentFilter.value));
            } else if (currentFilter.type === 'search' && currentFilter.value) {
                filteredTrends = allFetchedTrends.filter(t => 
                    t.title.toLowerCase().includes(currentFilter.value) || 
                    t.tags.some(tag => tag.toLowerCase().includes(currentFilter.value))
                );
            } else { // 'all' or empty search
                filteredTrends = allFetchedTrends;
            }
            
            renderFilterStatusBar();
            renderTrends(filteredTrends);
        }

        function renderFilterStatusBar() {
            const container = document.getElementById('filter-status-container');
            if (currentFilter.type === 'all' || (currentFilter.type === 'search' && !currentFilter.value)) {
                container.innerHTML = '';
                return;
            }
            
            let filterText = '';
            if (currentFilter.type === 'tag') {
                filterText = `tag: <span class="tag">#${currentFilter.value}</span>`;
            } else if (currentFilter.type === 'search') {
                filterText = `search: "${currentFilter.value}"`;
            }
            
            container.innerHTML = `
                <div class="filter-status-bar">
                    <span class="filter-text">Filtering by ${filterText}</span>
                    <button class="clear-filter-btn">Clear</button>
                </div>
            `;
            container.querySelector('.clear-filter-btn').addEventListener('click', () => {
                document.getElementById('search-input').value = '';
                applyFilter('all');
                setupCategoryFilters(); // Re-highlight 'All'
            });
        }

        function setupCategoryFilters() {
            const container = document.getElementById('category-filters');
            container.innerHTML = '';
            CATEGORIES.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-filter-btn';
                btn.textContent = category;
                
                // Set active based on current filter type and value
                if (currentFilter.type === 'category' && currentFilter.value === category) {
                    btn.classList.add('active');
                } else if (currentFilter.type !== 'category' && category === 'All') {
                    btn.classList.add('active');
                }

                btn.addEventListener('click', () => {
                    document.getElementById('search-input').value = ''; // Clear search on category click
                    applyFilter('category', category);
                    // Manually update active classes
                    container.querySelector('.active')?.classList.remove('active');
                    btn.classList.add('active');
                });
                container.appendChild(btn);
            });
        }

        function renderTrends(trendsToRender, userVotes = []) {
            const listEl = document.getElementById('trends-list');
            listEl.innerHTML = '';
            document.getElementById('load-more-container').classList.add('hidden'); // Hide pagination for now

            if (trendsToRender.length === 0) {
                listEl.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--gray);">No trends found.</div>`;
                return;
            }

            // Sort by vote count before rendering
            trendsToRender.sort((a, b) => (b.voteCount || 0) - (a.voteCount || 0));

            trendsToRender.forEach(trend => {
                const cardWrapper = document.createElement('div');
                // UPDATED: Hashtags are now links, vote button has icon
                cardWrapper.innerHTML = `
                    <a class="trend-card-link" href="${trend.sourceUrl || '#'}" target="_blank" rel="noopener noreferrer">
                        <div class="trend-card">
                            <!-- Header content -->
                            <p style="color: var(--gray);">${trend.description}</p>
                            <div class="trend-tags">
                                <span class="tag" style="background-color: var(--neon-purple); color: var(--white);">${trend.category}</span>
                                ${(trend.tags || []).map(tag => `<a href="#" class="tag tag-link" data-tag="${tag}">#${tag}</a>`).join('')}
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <span style="font-size: 1.5rem; font-weight: 700;">${trend.voteCount || 0}</span><span>Votes</span>
                                </div>
                                <button class="vote-btn" data-id="${trend.id}">🔥 Vote</button>
                            </div>
                        </div>
                    </a>`;
                listEl.appendChild(cardWrapper.firstElementChild);
            });
        }
        
        // --- DATA FETCHING (LIVE MODE) ---
        async function fetchAllTrends() {
            if (!db) return;
            try {
                const snapshot = await db.collection('trends').get();
                allFetchedTrends = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                applyFilter('all'); // Initial render after fetching
            } catch (error) {
                console.error("Error fetching all trends:", error);
                showToast("Could not load trends.", true);
            }
        }
        
        // ... Other functions like handleVote, handleTrendSubmit, seedDatabaseIfNeeded, etc.
        // ... They would need to be adapted to update `allFetchedTrends` after a change.
        // ... For example, after voting, update the voteCount in the local array and re-render.
    </script>
</body>
</html>
